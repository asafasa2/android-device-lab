<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Mirror — Android Device Lab</title>
  <style>
    :root {
      --bg:           #0f0f1a;
      --surface:      #1a1a2e;
      --card:         #12122a;
      --border:       #2a2a4a;
      --border-light: #3a3a5a;
      --text:         #e2e8f0;
      --text-muted:   #7a8494;
      --accent:       #4f8ef7;
      --green:        #22c55e;
      --yellow:       #f59e0b;
      --red:          #ef4444;
      --mono:         'Courier New', 'Consolas', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      color: var(--text-muted);
      background: transparent;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--border); color: var(--text); }
    .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-accent:hover { background: #3a7ef0; }

    .hdr-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .hdr-serial {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }
    .hdr-spacer { flex: 1; }

    /* ── Status indicators ───────────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .ws-dot.live { background: var(--green); }
    .badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
    }
    .badge-stream { color: var(--green); border-color: rgba(34,197,94,0.3); }

    /* ── Canvas area ─────────────────────────────── */
    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px;
      position: relative;
      outline: none;
    }

    #mirror-canvas {
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: crosshair;
      max-width: 100%;
      max-height: 100%;
      image-rendering: auto;
      display: block;
    }

    /* ── Device buttons bar ──────────────────────── */
    #device-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dev-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      background: var(--card);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .dev-btn:hover {
      background: var(--border);
      color: var(--text);
      border-color: var(--border-light);
    }
    .dev-btn:active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .dev-btn-icon {
      font-size: 14px;
      line-height: 1;
    }
    .btn-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* ── Status overlay ──────────────────────────── */
    #status-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 24px;
      z-index: 10;
    }
    #status-overlay.hidden { display: none; }
    .status-icon { font-size: 36px; line-height: 1; }
    .status-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .status-detail { font-size: 13px; color: var(--text-muted); max-width: 380px; line-height: 1.5; }
    .status-actions { display: flex; gap: 8px; margin-top: 4px; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ───────────────────────────────────── */
    #toast {
      position: fixed; bottom: 18px; right: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 7px;
      padding: 10px 15px; font-size: 12px;
      max-width: 260px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      z-index: 1000;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.err  { border-left-color: var(--red); }

    /* ── Tap ripple ──────────────────────────────── */
    .tap-ripple {
      position: absolute;
      width: 36px; height: 36px;
      margin-left: -18px; margin-top: -18px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: rgba(79, 142, 247, 0.25);
      pointer-events: none; z-index: 20;
      animation: ripple-out 0.45s ease-out forwards;
    }
    @keyframes ripple-out {
      0%   { transform: scale(0.3); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    /* ── Keyboard focus hint ─────────────────────── */
    #kbd-hint {
      position: absolute;
      bottom: 8px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(18,18,42,0.85);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 15;
    }
    #kbd-hint.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <a class="btn" href="/" title="Back to device list">&#8592; Devices</a>
  <div class="hdr-title">Screen Mirror</div>
  <span class="hdr-serial" id="hdr-serial">—</span>
  <div class="hdr-spacer"></div>
  <button class="btn" id="btn-refresh" onclick="requestRefresh()" title="Request a single frame">Refresh</button>
  <div class="status-row">
    <span class="badge" id="mode-badge">—</span>
    <span class="badge" id="fps-badge">— fps</span>
    <span class="ws-dot" id="ws-dot"></span>
    <span id="ws-label">Connecting…</span>
  </div>
</header>

<div id="canvas-wrap" tabindex="0">
  <canvas id="mirror-canvas"></canvas>

  <div id="status-overlay">
    <div class="status-icon" id="st-icon"></div>
    <div class="status-title" id="st-title"><span class="spinner"></span>Connecting…</div>
    <div class="status-detail" id="st-detail"></div>
    <div class="status-actions" id="st-actions"></div>
  </div>

  <div id="kbd-hint">Click here, then type — keys go to device</div>
</div>

<!-- Device hardware buttons -->
<div id="device-buttons">
  <button class="dev-btn" onclick="sendKey(4)"  title="Back">
    <span class="dev-btn-icon">&#9664;</span> Back
  </button>
  <button class="dev-btn" onclick="sendKey(3)"  title="Home">
    <span class="dev-btn-icon">&#9679;</span> Home
  </button>
  <button class="dev-btn" onclick="sendKey(187)" title="Recent Apps">
    <span class="dev-btn-icon">&#9632;</span> Recent
  </button>
  <div class="btn-sep"></div>
  <button class="dev-btn" onclick="sendKey(24)" title="Volume Up">
    Vol +
  </button>
  <button class="dev-btn" onclick="sendKey(25)" title="Volume Down">
    Vol -
  </button>
  <div class="btn-sep"></div>
  <button class="dev-btn" onclick="sendKey(26)" title="Power / Wake">
    Power
  </button>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Params ────────────────────────────────────────
const params = new URLSearchParams(location.search);
const serial = params.get('serial') || '';
if (serial) document.getElementById('hdr-serial').textContent = serial;

// ── State ─────────────────────────────────────────
let ws          = null;
let retryTimer  = null;
let toastTimer  = null;

let deviceW     = 1080;
let deviceH     = 1920;
let mirrorMode  = 'screencap';

// FPS tracking
let frameCount  = 0;
let fpsInterval = null;

// First-frame timeout
let firstFrameTimer = null;
let gotFirstFrame   = false;

// Drag tracking (for swipe)
let dragStart   = null;
const DRAG_THRESHOLD_PX = 8;

// Keyboard focus hint
let kbdHintTimer = null;

// ── Canvas ────────────────────────────────────────
const canvas    = document.getElementById('mirror-canvas');
const ctx       = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');

// ── Status overlay helpers ────────────────────────
function showStatus(icon, title, detail, actions) {
  document.getElementById('st-icon').textContent   = icon;
  document.getElementById('st-title').innerHTML     = title;
  document.getElementById('st-detail').textContent  = detail || '';
  const actEl = document.getElementById('st-actions');
  actEl.innerHTML = '';
  if (actions) actEl.innerHTML = actions;
  document.getElementById('status-overlay').classList.remove('hidden');
}

function hideStatus() {
  document.getElementById('status-overlay').classList.add('hidden');
}

// ── WebSocket ─────────────────────────────────────
function connect() {
  disconnect();
  gotFirstFrame = false;

  showStatus('', '<span class="spinner"></span>Connecting…', '', '');

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/mirror/${encodeURIComponent(serial)}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setWsState(true);
    showStatus('', '<span class="spinner"></span>Waiting for first frame…', '', '');

    if (firstFrameTimer) clearTimeout(firstFrameTimer);
    firstFrameTimer = setTimeout(() => {
      if (!gotFirstFrame) {
        showStatus('⚠', 'Mirror failed',
          'Device may not support screencap, or the screen is off.',
          '<button class="btn btn-accent" onclick="connect()">Retry</button> ' +
          '<a class="btn" href="/">← Back</a>');
      }
    }, 15000);
  };

  ws.onmessage = async (e) => {
    if (typeof e.data === 'string') {
      handleTextMsg(JSON.parse(e.data));
    } else {
      await handleFrame(e.data);
    }
  };

  ws.onclose = (e) => {
    setWsState(false);
    if (firstFrameTimer) { clearTimeout(firstFrameTimer); firstFrameTimer = null; }

    if (e.code === 1008) {
      showStatus('🔒', 'Not authenticated', 'Your session has expired.',
        '<a class="btn btn-accent" href="/">Sign in</a>');
      return;
    }
    if (e.code === 4003) {
      showStatus('🔒', 'Device not reserved by you',
        'You must reserve this device before using the mirror. Go back and click Reserve first.',
        '<a class="btn" href="/">← Back</a>');
      return;
    }
    if (e.code === 4004) {
      showStatus('📵', 'Device offline', 'The device is not connected or not found.',
        '<button class="btn btn-accent" onclick="connect()">Retry</button> ' +
        '<a class="btn" href="/">← Back</a>');
      return;
    }
    showStatus('', '<span class="spinner"></span>Reconnecting…', '', '');
    retryTimer = setTimeout(connect, 4000);
  };

  ws.onerror = () => ws.close();
}

function disconnect() {
  if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
  if (firstFrameTimer) { clearTimeout(firstFrameTimer); firstFrameTimer = null; }
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  setWsState(false);
}

function setWsState(live) {
  const dot   = document.getElementById('ws-dot');
  const label = document.getElementById('ws-label');
  if (live) {
    dot.classList.add('live');
    label.textContent = 'Connected';
  } else {
    dot.classList.remove('live');
    label.textContent = 'Disconnected';
  }
}

// ── Message handlers ──────────────────────────────
function handleTextMsg(msg) {
  if (msg.type === 'info') {
    deviceW = msg.width  || 1080;
    deviceH = msg.height || 1920;
    mirrorMode = msg.mode || 'screencap';
    sizeCanvas();
    if (msg.serial) document.getElementById('hdr-serial').textContent = msg.serial;

    const modeBadge = document.getElementById('mode-badge');
    if (mirrorMode === 'streaming') {
      modeBadge.textContent = '~5 fps';
      modeBadge.classList.add('badge-stream');
    } else {
      modeBadge.textContent = '1 fps';
      modeBadge.classList.remove('badge-stream');
    }

  } else if (msg.type === 'error') {
    toast(msg.message || 'screencap error', 'err');
    if (!gotFirstFrame) {
      showStatus('⚠', 'Mirror failed',
        msg.message || 'screencap failed — device may not support screen capture',
        '<button class="btn btn-accent" onclick="connect()">Retry</button> ' +
        '<a class="btn" href="/">← Back</a>');
    }

  } else if (msg.type === 'screen_off') {
    toast(msg.message || 'Screen is off', 'err');
    if (!gotFirstFrame) {
      showStatus('📱', 'Screen is off',
        'The device screen is off. Tap the device or press Power to wake it.',
        '<button class="btn btn-accent" onclick="sendKey(26); setTimeout(connect,1500)">Wake + Retry</button>');
    }

  } else if (msg.type === 'status') {
    toast(msg.message || '', '');
  }
}

async function handleFrame(buf) {
  try {
    // Auto-detect JPEG vs PNG from magic bytes
    const bytes = new Uint8Array(buf);
    const isJpeg = bytes[0] === 0xFF && bytes[1] === 0xD8;
    const mime = isJpeg ? 'image/jpeg' : 'image/png';

    const blob = new Blob([buf], { type: mime });
    const bmp  = await createImageBitmap(blob);
    ctx.drawImage(bmp, 0, 0, canvas.width, canvas.height);
    bmp.close();
    frameCount++;

    if (!gotFirstFrame) {
      gotFirstFrame = true;
      if (firstFrameTimer) { clearTimeout(firstFrameTimer); firstFrameTimer = null; }
      hideStatus();
      // Focus canvas for keyboard input
      canvasWrap.focus();
    }
  } catch (e) {
    // Corrupt frame — skip silently
  }
}

// ── Manual refresh ────────────────────────────────
function requestRefresh() {
  send({ type: 'refresh' });
}

// ── Canvas sizing ─────────────────────────────────
function sizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth  - 24;
  const maxH = wrap.clientHeight - 24;
  const ratio = deviceW / deviceH;
  let w = maxW;
  let h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width  = Math.round(w);
  canvas.height = Math.round(h);
}

window.addEventListener('resize', sizeCanvas);

// ── Touch / mouse input ──────────────────────────
function canvasNorm(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / rect.width,
    y: (e.clientY - rect.top)  / rect.height,
  };
}

function showRipple(clientX, clientY) {
  const wrapRect = canvasWrap.getBoundingClientRect();
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  ripple.style.left = (clientX - wrapRect.left) + 'px';
  ripple.style.top  = (clientY - wrapRect.top)  + 'px';
  canvasWrap.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

canvas.addEventListener('mousedown', e => {
  const pos = canvasNorm(e);
  dragStart = { ...pos, time: Date.now(), clientX: e.clientX, clientY: e.clientY };
});

canvas.addEventListener('mouseup', e => {
  if (!dragStart) return;
  const pos = canvasNorm(e);
  const dx  = e.clientX - dragStart.clientX;
  const dy  = e.clientY - dragStart.clientY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < DRAG_THRESHOLD_PX) {
    showRipple(e.clientX, e.clientY);
    send({ type: 'tap', x: pos.x, y: pos.y });
  } else {
    const duration = Math.max(100, Date.now() - dragStart.time);
    send({ type: 'swipe', x1: dragStart.x, y1: dragStart.y, x2: pos.x, y2: pos.y, duration });
  }
  dragStart = null;
});

canvas.addEventListener('mouseleave', () => { dragStart = null; });

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t   = e.touches[0];
  const pos = canvasNorm(t);
  dragStart = { ...pos, time: Date.now(), clientX: t.clientX, clientY: t.clientY };
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!dragStart) return;
  const t   = e.changedTouches[0];
  const pos = canvasNorm(t);
  const dx  = t.clientX - dragStart.clientX;
  const dy  = t.clientY - dragStart.clientY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < DRAG_THRESHOLD_PX) {
    showRipple(t.clientX, t.clientY);
    send({ type: 'tap', x: pos.x, y: pos.y });
  } else {
    const duration = Math.max(100, Date.now() - dragStart.time);
    send({ type: 'swipe', x1: dragStart.x, y1: dragStart.y, x2: pos.x, y2: pos.y, duration });
  }
  dragStart = null;
}, { passive: false });

// ── Keyboard input ────────────────────────────────
// JS key → Android keyevent code
const KEY_MAP = {
  'Enter':      66,
  'Backspace':  67,
  'Delete':     112,
  'Escape':     4,   // Back
  'Tab':        61,
  'ArrowUp':    19,
  'ArrowDown':  20,
  'ArrowLeft':  21,
  'ArrowRight': 22,
  'Home':       3,
  ' ':          62,  // Space
};

canvasWrap.addEventListener('keydown', e => {
  // Don't capture if typing in an input field
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  const keycode = KEY_MAP[e.key];
  if (keycode !== undefined) {
    e.preventDefault();
    sendKey(keycode);
  } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    // Single printable character
    e.preventDefault();
    send({ type: 'text', text: e.key });
  }
});

// Show keyboard hint when canvas gets focus
canvasWrap.addEventListener('focus', () => {
  const hint = document.getElementById('kbd-hint');
  hint.classList.add('show');
  if (kbdHintTimer) clearTimeout(kbdHintTimer);
  kbdHintTimer = setTimeout(() => hint.classList.remove('show'), 3000);
});

// ── Device button helpers ─────────────────────────
function sendKey(code) {
  send({ type: 'keyevent', code });
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

// ── FPS counter ───────────────────────────────────
fpsInterval = setInterval(() => {
  document.getElementById('fps-badge').textContent = frameCount + ' fps';
  frameCount = 0;
}, 1000);

// ── Toast ─────────────────────────────────────────
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `show ${type || ''}`;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Boot ──────────────────────────────────────────
if (!serial) {
  showStatus('⚠', 'No device specified', 'Add ?serial=XXXX to the URL.',
    '<a class="btn" href="/">← Back</a>');
} else {
  sizeCanvas();
  connect();
}
</script>
</body>
</html>
